<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>의견 남기기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAaVlgZsdQG-3dTR5s60PyIblAHEFQVHk",
  authDomain: "tell-me-82caa.firebaseapp.com",
  projectId: "tell-me-82caa",
  storageBucket: "tell-me-82caa.firebasestorage.app",
  messagingSenderId: "306688675540",
  appId: "1:306688675540:web:616b71b69581631aa07541"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

window._submitToFirebase = async function(classname, name, content, sessionCode) {
  await addDoc(collection(db, "posts"), {
    classname, name, content, sessionCode,
    createdAt: serverTimestamp()
  });
};
</script>
<style>
:root {
  --accent:#3d6b4f; --bg:#f2f6f3; --card:#fff;
  --text:#1e1e1e; --muted:#888; --border:#d8e4db;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px}

.session-badge{width:100%;max-width:480px;background:#1e4030;color:#fff;border-radius:10px;padding:8px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;font-size:.78rem}
.session-code{font-weight:700;letter-spacing:.12em;font-family:monospace;font-size:1rem;background:rgba(255,255,255,.15);padding:2px 10px;border-radius:5px}

.topic-banner{width:100%;max-width:480px;background:var(--accent);color:#fff;border-radius:14px;padding:14px 18px;margin-bottom:16px;text-align:center}
.topic-label{font-size:.7rem;opacity:.72;margin-bottom:3px;letter-spacing:.05em}
.topic-text{font-size:1.05rem;font-weight:700;line-height:1.4}

.manual-session{width:100%;max-width:480px;background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.manual-session h3{font-size:.88rem;font-weight:700;margin-bottom:10px}
.manual-session input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:.95rem;outline:none;transition:border-color .2s;margin-bottom:8px}
.manual-session input:focus{border-color:var(--accent)}
.manual-session button{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer}

.card{width:100%;max-width:480px;background:var(--card);border-radius:18px;padding:22px 20px;box-shadow:0 4px 18px rgba(0,0,0,.07)}
.card-title{font-size:.95rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:7px}

.field{margin-bottom:14px}
label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.03em}
input,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.93rem;color:var(--text);background:#f9fbfa;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,textarea:focus{border-color:var(--accent);background:#fff}
textarea{resize:none;height:120px;line-height:1.55}
.char-count{text-align:right;font-size:.7rem;color:var(--muted);margin-top:3px}

.submit-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:.97rem;font-weight:700;cursor:pointer;margin-top:4px;transition:.18s;display:flex;align-items:center;justify-content:center;gap:7px}
.submit-btn:hover{filter:brightness(1.1)}
.submit-btn:active{transform:scale(.97)}
.submit-btn:disabled{background:#b0c4b8;cursor:default}

.success-card{width:100%;max-width:480px;background:var(--card);border-radius:18px;padding:38px 22px;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.07);display:none;animation:popin .4s cubic-bezier(.23,1.5,.5,1)}
@keyframes popin{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.success-icon{font-size:3.2rem;margin-bottom:12px}
.success-title{font-size:1.25rem;font-weight:700;margin-bottom:7px;color:var(--accent)}
.success-sub{font-size:.85rem;color:var(--muted);line-height:1.6;margin-bottom:22px}
.again-btn{padding:12px 30px;background:var(--bg);color:var(--accent);border:2px solid var(--accent);border-radius:10px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:.18s}
.again-btn:hover{background:var(--accent);color:#fff}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:50px;font-size:.83rem;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="page">

  <div class="session-badge" id="sessionBadge" style="display:none">
    <span>🔑 세션</span>
    <span class="session-code" id="sessionCodeDisplay"></span>
  </div>

  <div class="topic-banner">
    <div class="topic-label">📌 오늘의 주제</div>
    <div class="topic-text" id="topicText">수업 주제를 불러오는 중...</div>
  </div>

  <div class="manual-session" id="manualSession" style="display:none">
    <h3>🔑 세션 코드 입력</h3>
    <input type="text" id="manualCodeInput" placeholder="선생님이 알려준 코드를 입력하세요" maxlength="12">
    <button onclick="enterManualSession()">입장하기</button>
  </div>

  <div class="card" id="formCard" style="display:none">
    <div class="card-title">✏️ 내 의견 남기기</div>

    <div class="field">
      <label>학반 *</label>
      <input type="text" id="classname" placeholder="예: 2학년 3반" maxlength="20">
    </div>

    <div class="field">
      <label>이름 *</label>
      <input type="text" id="name" placeholder="이름을 입력하세요" maxlength="10">
    </div>

    <div class="field">
      <label>의견 *</label>
      <textarea id="content" placeholder="자유롭게 의견을 입력하세요" maxlength="200" oninput="updateCount()"></textarea>
      <div class="char-count"><span id="charCount">0</span>/200자</div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitPost()">
      📌 의견 게시하기
    </button>
  </div>

  <div class="success-card" id="successCard">
    <div class="success-icon">🎉</div>
    <div class="success-title">의견이 올라갔어요!</div>
    <div class="success-sub">선생님 화면에서<br>내 포스트잇을 확인할 수 있어요.</div>
    <button class="again-btn" onclick="reset()">다시 입력하기</button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const urlParams = new URLSearchParams(location.search);
let sessionCode = (urlParams.get('session') || '').toUpperCase().trim();
const TITLE_KEY = 'classroom_title_v1';

function init() {
  const saved = localStorage.getItem(TITLE_KEY);
  if (saved) document.getElementById('topicText').textContent = saved;

  if (sessionCode) {
    document.getElementById('sessionBadge').style.display = 'flex';
    document.getElementById('sessionCodeDisplay').textContent = sessionCode;
    document.getElementById('formCard').style.display = 'block';
  } else {
    document.getElementById('manualSession').style.display = 'block';
    document.getElementById('topicText').textContent = '선생님이 알려준 세션 코드를 입력하세요';
  }
}

function enterManualSession() {
  const code = document.getElementById('manualCodeInput').value.trim().toUpperCase();
  if (!code) { showToast('세션 코드를 입력해주세요'); return; }
  sessionCode = code;
  document.getElementById('sessionBadge').style.display = 'flex';
  document.getElementById('sessionCodeDisplay').textContent = code;
  document.getElementById('manualSession').style.display = 'none';
  document.getElementById('formCard').style.display = 'block';
  document.getElementById('topicText').textContent = localStorage.getItem(TITLE_KEY) || '수업 중입니다';
}

function updateCount() {
  document.getElementById('charCount').textContent = document.getElementById('content').value.length;
}

async function submitPost() {
  const classname = document.getElementById('classname').value.trim();
  const name      = document.getElementById('name').value.trim();
  const content   = document.getElementById('content').value.trim();

  if (!classname) { showToast('학반을 입력해주세요'); return; }
  if (!name)      { showToast('이름을 입력해주세요'); return; }
  if (!content)   { showToast('의견을 입력해주세요'); return; }
  if (!sessionCode){ showToast('세션 코드가 없어요. 다시 QR을 스캔해주세요'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '등록 중...';

  try {
    await window._submitToFirebase(classname, name, content, sessionCode);
    document.getElementById('formCard').style.display = 'none';
    document.getElementById('successCard').style.display = 'block';
  } catch(e) {
    showToast('오류가 발생했어요. 다시 시도해주세요.');
    btn.disabled = false;
    btn.innerHTML = '📌 의견 게시하기';
  }
}

function reset() {
  document.getElementById('classname').value = '';
  document.getElementById('name').value = '';
  document.getElementById('content').value = '';
  document.getElementById('charCount').textContent = '0';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').innerHTML = '📌 의견 게시하기';
  document.getElementById('formCard').style.display = 'block';
  document.getElementById('successCard').style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
